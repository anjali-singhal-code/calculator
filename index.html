<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div id="calculator">
    <input id="display" type="text" readonly>
    <div id="buttons">
      <button id="clear" class="operators">C</button>
      <button id="backspace" class="operators">DEL</button>
      <button class="button operators">/</button>
      <button class="button operators">*</button>
      <button class="button">7</button>
      <button class="button">8</button>
      <button class="button">9</button>
      <button class="button operators">-</button>
      <button class="button">4</button>
      <button class="button">5</button>
      <button class="button">6</button>
      <button class="button operators">+</button>
      <button class="button">1</button>
      <button class="button">2</button>
      <button class="button">3</button>
      <button id="toggle-sign" class="operators">+/-</button>
      <button class="button">00</button>
      <button class="button">0</button>
      <button class="button">.</button>
      <button id="equals" class="operators">=</button>
    </div>

<script src="./script.js"></script>  
   
</body>

</html>
